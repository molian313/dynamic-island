<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Liquid Glass Island</title>
  <link rel="stylesheet" href="controls.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: #0a0a0c;
      overflow: hidden;
      height: 100%;
    }
  </style>
</head>
<body>
  <script>
    // Initialize __liquidGlassConfig with full defaults, then merge saved state
    (function() {
      var DEFAULTS = {
        refThickness: 20,
        refFactor: 1.4,
        refDispersion: 7,
        refFresnelRange: 30,
        refFresnelHardness: 20,
        refFresnelFactor: 20,
        glareRange: 30,
        glareHardness: 20,
        glareFactor: 90,
        glareConvergence: 50,
        glareOppositeFactor: 80,
        glareAngle: -45,
        blurRadius: 1,
        blurEdge: true,
        tint: { r: 255, g: 255, b: 255, a: 0 },
        shadowExpand: 25,
        shadowFactor: 15,
        shadowPosition: { x: 0, y: -10 },
        shapeWidth: 140,
        shapeHeight: 50,
        shapeRadius: 25,
        shapeRoundness: 5,
        shape1Width: 50,
        shape1Height: 50,
        shape1Radius: 25,
        mergeRate: 0.05,
        showShape1: true,
        islandGap: 6,
        springSizeFactor: 10,
        bgType: 0,
        cssShadowBlur: 5,
        cssShadowOpacity: 0.25,
        cssShadowOffsetY: 0,
        cssShadowTop: 5
      };
      var cfg = JSON.parse(JSON.stringify(DEFAULTS));
      try {
        var saved = localStorage.getItem('liquid-glass-current-state');
        if (saved) {
          var parsed = JSON.parse(saved);
          Object.keys(parsed).forEach(function(k) {
            if (typeof parsed[k] === 'object' && parsed[k] !== null && !Array.isArray(parsed[k]) && typeof cfg[k] === 'object') {
              Object.assign(cfg[k], parsed[k]);
            } else {
              cfg[k] = parsed[k];
            }
          });
        }
      } catch(e) {}
      window.__liquidGlassConfig = cfg;
    })();
  </script>
  <script>
    // Catch errors from controls.js
    window.onerror = function(msg, src, line, col, err) {
      document.body.innerHTML = '<div style="color:#f66;padding:20px;font:13px monospace;white-space:pre-wrap">'
        + 'Error: ' + msg + '\n' + (src || '') + ':' + line + ':' + col + '</div>';
    };
  </script>
  <script src="controls.js"></script>
  <script>
    // Forward settings changes to main window via Rust command
    var origSetItem = localStorage.setItem.bind(localStorage);
    localStorage.setItem = function(key, value) {
      origSetItem(key, value);
      if (key === 'liquid-glass-current-state') {
        try {
          var payload = JSON.parse(value);
          window.__TAURI__.core.invoke('forward_settings', { settings: payload });
        } catch(e) {}
      }
    };
  </script>
</body>
</html>
