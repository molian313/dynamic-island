<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>设置 - Liquid Glass Island</title>
  <link rel="stylesheet" href="controls.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="icons/128x128.png" alt="Liquid Glass Island">
        <div class="sidebar-header-text">
          <h1>Liquid Glass Island</h1>
          <p>设置</p>
        </div>
      </div>
      <nav class="nav-list">
        <div class="nav-item active" data-page="general">常规设置</div>
        <div class="nav-item" data-page="printer">打印机</div>
        <div class="nav-item" data-page="blacklist">屏蔽列表</div>
        <div class="nav-item" data-page="glass">玻璃参数</div>
      </nav>
    </aside>

    <div class="content">
      <header class="content-header">
        <h2 id="page-title">常规设置</h2>
        <p id="page-desc">配置系统选项。</p>
      </header>

      <div class="content-body">
        <div class="page active" id="page-general">
          <div class="setting-group">
            <div class="setting-group-title">系统</div>
            <div class="setting-item">
              <div class="setting-label">
                <h3>开机自启</h3>
                <p>Windows 启动时自动运行。</p>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="auto-start-toggle">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
            <div class="setting-item">
              <div class="setting-label">
                <h3>调试模式</h3>
                <p>在灵动岛左侧显示展开/收起按钮，方便调试界面。</p>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="debug-toggle">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <div class="page" id="page-printer">
          <div class="setting-group">
            <div class="setting-group-title">打印机列表</div>
            <div id="printer-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
            <div class="form-grid">
              <input id="pcfg-name" class="input" type="text" placeholder="名称（如：2号）">
              <input id="pcfg-ip" class="input" type="text" placeholder="IP 地址">
              <input id="pcfg-access" class="input" type="text" placeholder="访问码">
              <input id="pcfg-serial" class="input" type="text" placeholder="序列号">
            </div>
            <div style="display:flex;gap:8px;">
              <button id="pcfg-add" class="btn btn-primary">添加</button>
              <button id="pcfg-save" class="btn btn-primary">保存配置</button>
            </div>
          </div>
        </div>

        <div class="page" id="page-blacklist">
          <div class="setting-group">
            <div class="setting-group-title">屏蔽设置</div>
            <div class="setting-item">
              <div class="setting-label">
                <h3>启用屏蔽</h3>
                <p>当黑名单中的进程在前台时，自动隐藏灵动岛。</p>
              </div>
              <div class="setting-control">
                <label class="switch">
                  <input type="checkbox" id="blacklist-enabled">
                  <span class="slider"></span>
                </label>
              </div>
            </div>
          </div>
          <div class="setting-group">
            <div class="setting-group-title">黑名单进程</div>
            <div id="blacklist-list" style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px;"></div>
            <div style="display:flex;gap:8px;">
              <input id="blacklist-input" class="input" type="text" placeholder="进程名（如：chrome.exe）" style="flex:1;">
              <button id="blacklist-add" class="btn btn-primary">添加</button>
              <button id="blacklist-save" class="btn btn-primary">保存</button>
            </div>
          </div>
        </div>

        <div class="page" id="page-glass">
          <div id="glass-container" style="min-height:100%;"></div>
        </div>
      </div>

      <div id="status" class="status">已保存</div>
          </div>
          <div class="setting-group">
            <div class="setting-group-title">外观</div>
            <div class="setting-item">
              <div class="setting-label">
                <h3>主题</h3>
                <p>切换液态玻璃或经典深色模式。</p>
              </div>
              <div class="setting-control">
                <select id="theme-select" class="input" style="min-width:140px;">
                  <option value="glass">液态玻璃</option>
                  <option value="classic">经典模式</option>
                </select>
              </div>
            </div>
          </div>
        </div>

  <script src="src/settings-init.js"></script>
</body>
</html>
