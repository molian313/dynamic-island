<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Island</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* === DOM overlay for island content === */
    #island-overlay {
      position: fixed;
      top: 70px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 10;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      transition: top 0.05s linear;
    }

    /* Left panel (time + sysinfo) */
    #overlay-left {
      width: 140px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: #fff;
      transition: width 0.35s cubic-bezier(0.25, 1, 0.5, 1),
                  height 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      overflow: hidden;
      white-space: nowrap;
    }
    #overlay-left.expanded {
      width: 270px;
      height: 74px;
      flex-direction: column;
      gap: 2px;
    }
    #overlay-left.compact {
      width: 86px;
    }
    #overlay-left.compact.expanded {
      width: 200px;
    }

    .time-text {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: rgba(255,255,255,0.95);
      transition: font-size 0.3s ease;
    }
    .expanded .time-text { font-size: 18px; }

    .sysinfo {
      display: flex;
      flex-direction: column;
      gap: 2px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .expanded .sysinfo { opacity: 1; }

    .mem-label, .net-label {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.5);
      font-variant-numeric: tabular-nums;
    }
    .net-row {
      display: flex;
      gap: 8px;
    }

    /* Right panel (indicator placeholder) */
    #overlay-right {
      width: 50px;
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: width 0.35s cubic-bezier(0.25, 1, 0.5, 1),
                  height 0.3s cubic-bezier(0.25, 1, 0.5, 1);
      overflow: hidden;
    }
    #overlay-right.expanded {
      width: 140px;
      height: 74px;
    }
    #overlay-right.compact {
      width: 104px;
    }
    #overlay-right.compact.expanded {
      width: 210px;
      height: 74px;
    }

    .indicator-ring {
      width: 42px;
      height: 42px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .indicator-ring svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .indicator-ring .percent {
      font-size: 10px;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      position: relative;
      z-index: 1;
    }

    /* Hide controls panel in Tauri mode */
    .tauri-mode #controls-panel,
    .tauri-mode #upload-btn,
    .tauri-mode #file-input {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="glCanvas"></canvas>

  <!-- DOM overlay for island content -->
  <div id="island-overlay">
    <div id="overlay-left">
      <span class="time-text" id="ov-time">--:--:--</span>
      <div class="sysinfo">
        <span class="mem-label" id="ov-mem">内存 --</span>
        <div class="net-row">
          <span class="net-label" id="ov-net-up">↑ --</span>
          <span class="net-label" id="ov-net-down">↓ --</span>
        </div>
      </div>
    </div>
    <div id="overlay-right">
      <div class="indicator-ring">
        <svg viewBox="0 0 30 30">
          <circle cx="15" cy="15" r="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3.2"/>
          <circle class="printer-progress" cx="15" cy="15" r="12" fill="none" stroke="#22c55e" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="75.4" stroke-dashoffset="75.4" transform="rotate(-90 15 15)"/>
        </svg>
        <span class="percent">--</span>
      </div>
    </div>
  </div>

  <!-- Standalone controls (hidden in Tauri mode) -->
  <button id="upload-btn" title="Upload background image">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </button>
  <input type="file" id="file-input" accept="image/*" style="display:none;">

  <link rel="stylesheet" href="controls.css">
  <script src="app.js?v=12"></script>
  <script src="controls.js?v=12"></script>
  <script>
    // Detect Tauri environment
    (function() {
      const isTauri = window.__TAURI__ !== undefined;
      if (isTauri) {
        document.body.classList.add('tauri-mode');
        initTauriMode();
      }
    })();

    async function initTauriMode() {
      const { invoke } = window.__TAURI__.core;
      const { listen } = window.__TAURI__.event;

      // Listen for expand/collapse from Rust
      await listen('set-expand', (event) => {
        const expanded = event.payload;
        const left = document.getElementById('overlay-left');
        const right = document.getElementById('overlay-right');
        if (expanded) {
          left.classList.add('expanded');
          right.classList.add('expanded');
        } else {
          left.classList.remove('expanded');
          right.classList.remove('expanded');
        }
        // Sync hover state with app.js
        if (window.__liquidGlassState) {
          window.__liquidGlassState.setHover(expanded);
        }
      });

      // Update time
      function updateTime() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('ov-time').textContent = h + ':' + m + ':' + s;
      }
      updateTime();
      setInterval(updateTime, 1000);

      // Update system info
      async function updateSysInfo() {
        try {
          const info = await invoke('get_system_stats');
          document.getElementById('ov-mem').textContent = '内存 ' + info.memory_percent + '%';
          document.getElementById('ov-net-up').textContent = '↑ ' + info.net_up_speed;
          document.getElementById('ov-net-down').textContent = '↓ ' + info.net_down_speed;
        } catch (e) {
          console.error('[SysInfo]', e);
        }
      }
      updateSysInfo();
      setInterval(updateSysInfo, 1500);

      // Emit interacting state for click-through
      const canvas = document.getElementById('glCanvas');
      canvas.addEventListener('mouseenter', () => {
        window.__TAURI__.event.emit('set-interacting', true);
      });
      canvas.addEventListener('mouseleave', () => {
        window.__TAURI__.event.emit('set-interacting', false);
      });
    }
  </script>
</body>
</html>
