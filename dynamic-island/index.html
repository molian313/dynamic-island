<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liquid Glass Island</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ===== Reset ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* ===== Spring Animations ===== */
    @keyframes springWidthExpand {
      0% { transform: scaleX(0.92); }
      35% { transform: scaleX(1.025); }
      55% { transform: scaleX(0.99); }
      75% { transform: scaleX(1.005); }
      100% { transform: scaleX(1); }
    }

    html, body {
      width: 100vw;
      height: fit-content;
      background: transparent;
      display: block;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    :root {
      --adaptive-text: #ffffff;
    }

    /* ===== Main Capsule ===== */
    #island-capsule {
      width: fit-content;
      height: 50px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      position: fixed;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: auto;
      background: transparent;
      transition: height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      will-change: height, border-radius;
      isolation: isolate;
      z-index: 100;
    }

    #island-capsule.expanded {
      height: 74px;
      border-radius: 35px;
    }

    /* ===== Left Panel ===== */
    .left-panel {
      height: 50px;
      background: transparent;
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      pointer-events: auto;
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.3s ease;
      will-change: width, height;
      align-self: flex-start;
    }

    .left-panel.time-mode { width: 140px; }
    .left-panel.time-mode.expanded { width: 270px; height: 74px; border-radius: 35px; animation: springWidthExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .left-panel.shortcuts-mode { width: 140px; }
    .left-panel.shortcuts-mode.expanded { width: 270px; height: 74px; border-radius: 35px; animation: springWidthExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .left-panel.time-mode.multi-open { width: 86px; }
    .left-panel.time-mode.multi-open.expanded { width: 200px; height: 74px; border-radius: 35px; animation: springWidthExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .left-panel.time-mode.multi-open.expanded .mem-label { opacity: 0; pointer-events: none; }
    .left-panel.shortcuts-mode .time-view { display: none; }
    .left-panel.time-mode .shortcut-view { display: none; }
    .left-panel.time-mode.multi-open.expanded .net-info { opacity: 0; pointer-events: none; }
    .left-panel.shortcuts-mode.multi-open { width: 86px; padding: 0 4px; }
    .shortcuts-mode.multi-open .shortcut-list { gap: 4px; }
    .shortcuts-mode.multi-open.expanded { width: 200px; height: 74px; border-radius: 35px; animation: springWidthExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .shortcuts-mode.multi-open.expanded .shortcut-list { gap: 6px; }

    /* ===== Right Panel ===== */
    .right-panel {
      height: 50px;
      background: transparent;
      border-radius: 25px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 8px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      flex-shrink: 0;
      pointer-events: auto;
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  height 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  gap 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  border-radius 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  background 0.3s ease;
      will-change: width, height;
      align-self: flex-start;
    }

    .right-panel.single-mode { width: 50px; padding: 0; justify-content: center; }
    .right-panel.single-mode:not(.expanded) .printer-unit { transform: translateX(21px); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .right-panel.single-mode.expanded .printer-unit { transform: translateX(0); transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .right-panel.single-mode.expanded { width: 140px; height: 74px; border-radius: 35px; padding: 0 8px; justify-content: center; animation: springWidthExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .right-panel.multi-mode { width: 104px; gap: 4px; }
    .right-panel.multi-mode.expanded { width: 210px; height: 74px; border-radius: 35px; gap: 45px; overflow: visible; animation: springWidthExpand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .multi-mode .printer-unit { transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .multi-mode.expanded .printer-unit { transform: translateX(-16px); }

    /* ===== Time View ===== */
    .time-view {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      white-space: nowrap;
      position: relative;
    }

    .time-text {
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      text-align: center;
      min-width: 7.5ch;
      transition: font-size 0.3s ease, color 0.3s ease;
      will-change: font-size;
    }

    .expanded .time-text { font-size: 18px; min-width: 7.5ch; }

    .mem-label {
      color: #aaa;
      font-size: 12px;
      font-weight: 500;
      position: absolute;
      top: 50%;
      right: calc(50% + 60px);
      transform: translateY(-50%) translateX(60px) scale(0.8);
      opacity: 0;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      transition: opacity 0.32s cubic-bezier(0.25, 1, 0.5, 1),
                  transform 0.32s cubic-bezier(0.25, 1, 0.5, 1),
                  color 0.3s ease;
    }

    .expanded .mem-label { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }

    .net-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 10px;
      font-weight: 400;
      color: #777;
      position: absolute;
      top: 50%;
      left: calc(50% + 60px);
      transform: translateY(-50%) translateX(-60px) scale(0.8);
      opacity: 0;
      font-variant-numeric: tabular-nums;
      pointer-events: none;
      transition: opacity 0.32s cubic-bezier(0.25, 1, 0.5, 1) 0.05s,
                  transform 0.32s cubic-bezier(0.25, 1, 0.5, 1) 0.05s,
                  color 0.3s ease;
    }

    .expanded .net-info { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }

    /* ===== Shortcut View ===== */
    .shortcut-view {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
    }

    .shortcut-list {
      display: flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
      overflow: hidden;
      transition: gap 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .shortcuts-mode .shortcut-list { opacity: 1; }
    .shortcuts-mode.multi-open .shortcut-list { max-width: 80px; }
    .shortcuts-mode.expanded .shortcut-list { gap: 8px; overflow: visible; max-width: none; }

    .sc-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
      position: relative;
      padding-bottom: 14px;
      cursor: pointer;
      transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                  transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .sc-item:hover { transform: scale(1.08); }
    .sc-item.dragging { opacity: 0.3; transform: scale(0.9); }

    .shortcuts-mode .sc-item { width: 36px; }
    .shortcuts-mode.multi-open .sc-item { width: 34px; }
    .shortcuts-mode.expanded .sc-item { width: 41px; }
    .shortcuts-mode.multi-open.expanded .sc-item { width: 36px; }

    .sc-icon { font-size: 18px; line-height: 1; }
    .sc-icon img { width: 24px; height: 24px; object-fit: contain; }

    .sc-label {
      font-size: 9px;
      font-weight: 400;
      color: #aaa;
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), color 0.3s ease;
    }

    .sc-label-short { opacity: 1; transform: translateX(-50%) translateY(0); }
    .sc-label-full { font-size: 10px; font-weight: 400; max-width: 68px; opacity: 0; }
    .shortcuts-mode.expanded .sc-label-short { opacity: 0; }
    .shortcuts-mode.expanded .sc-label-full { opacity: 1; }

    .shortcut-empty {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      padding: 4px;
    }

    .shortcut-view.drag-over {
      background: rgba(34, 197, 94, 0.15);
      border-radius: 20px;
    }

    /* ===== Printer Unit ===== */
    .printer-unit {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 42px;
      position: relative;
    }

    .printer-unit-2 {
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 0.3s ease,
                  transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .multi-mode .printer-unit-2 { opacity: 1; transform: scale(1); }

    .printer-circle {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .printer-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .printer-progress {
      transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
    }

    .printer-percent {
      color: white;
      font-size: 10px;
      font-weight: 600;
      position: relative;
      z-index: 1;
      opacity: 0.9;
    }

    .printer-detail {
      display: flex;
      flex-direction: column;
      white-space: nowrap;
      position: absolute;
      left: calc(100% + 8px);
      top: 50%;
      transform: translateY(-50%) translateX(-20px) scale(0.8);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s cubic-bezier(0.25, 1, 0.5, 1),
                  transform 0.32s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .expanded .printer-detail { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }

    .printer-name { color: white; font-size: 12px; font-weight: 500; }
    .printer-status { color: #888; font-size: 10px; font-weight: 400; opacity: 0.7; }

    .printer-detail-2 {
      opacity: 0;
      transition: opacity 0.32s cubic-bezier(0.25, 1, 0.5, 1) 0.08s,
                  transform 0.32s cubic-bezier(0.25, 1, 0.5, 1) 0.08s;
    }

    .expanded .printer-detail-2 { opacity: 1; transform: translateY(-50%) translateX(0) scale(1); }

    /* ===== Collapsed Indicator ===== */
    #collapsed-indicator {
      display: none;
      position: fixed;
      top: 13px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, #22c55edd, #22c55e, #22c55edd);
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
      cursor: pointer;
      pointer-events: auto;
      z-index: 200;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.2s ease, width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #collapsed-indicator:hover {
      transform: translateX(-50%) scaleX(1.15);
      width: 70px;
      box-shadow: 0 0 12px rgba(34, 197, 94, 0.7);
    }

    #collapsed-indicator:active {
      transform: translateX(-50%) scaleX(1.05);
    }

    /* ===== Shadow Layer ===== */
    .island-shadow {
      position: fixed;
      background: transparent;
      pointer-events: none;
      z-index: 5;
    }

    /* ===== Debug Button ===== */
    .debug-expand-btn {
      position: fixed;
      top: 11px;
      left: 5px;
      height: 50px;
      padding: 0 12px;
      background: #1a1a1a;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 25px;
      font-size: 12px;
      cursor: pointer;
      z-index: 101;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
      white-space: nowrap;
    }

    .debug-expand-btn:hover { background: #2a2a2a; }

    /* ===== Reduced Motion ===== */
    @media (prefers-reduced-motion: reduce) {
      #island-capsule, .left-panel, .right-panel,
      .time-view, .time-text, .mem-label, .net-info,
      .printer-unit, .printer-circle, .printer-unit-2,
      .printer-detail, .printer-detail-2, .printer-progress,
      .sc-item, .sc-label, .shortcut-list,
      #collapsed-indicator {
        transition-duration: 0.01s !important;
        animation-duration: 0.01s !important;
      }
    }

    /* ===== Tauri Mode: hide dev controls ===== */
    .tauri-mode #controls-panel,
    .tauri-mode #upload-btn,
    .tauri-mode #file-input {
      display: none !important;
    }
  </style>
</head>
<body>
  <canvas id="glCanvas"></canvas>

  <!-- Shadow layer -->
  <div class="island-shadow" id="shadow-left"></div>
  <div class="island-shadow" id="shadow-right"></div>

  <!-- Main capsule -->
  <div id="island-capsule">
    <!-- Left panel: time/shortcuts -->
    <div id="left-panel" class="left-panel time-mode">
      <div class="time-view">
        <span class="mem-label" id="ov-mem">内存 --</span>
        <span class="time-text" id="ov-time">--:--:--</span>
        <div class="net-info">
          <span id="net-up">--</span>
          <span id="net-down">--</span>
        </div>
      </div>
      <div class="shortcut-view" id="shortcut-area">
        <div class="shortcut-list" id="shortcut-list"></div>
      </div>
    </div>

    <!-- Right panel: printer circles -->
    <div id="right-panel" class="right-panel single-mode">
      <div class="printer-unit">
        <div class="printer-circle">
          <svg class="printer-svg" viewBox="0 0 30 30">
            <circle cx="15" cy="15" r="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3.2"/>
            <circle class="printer-progress" cx="15" cy="15" r="12" fill="none" stroke="#22c55e" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="75.4" stroke-dashoffset="75.4" transform="rotate(-90 15 15)"/>
          </svg>
          <span class="printer-percent">--</span>
        </div>
        <div class="printer-detail">
          <span class="printer-name">--</span>
          <span class="printer-status">--</span>
        </div>
      </div>
      <div class="printer-unit printer-unit-2">
        <div class="printer-circle">
          <svg class="printer-svg" viewBox="0 0 30 30">
            <circle cx="15" cy="15" r="12" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="3.2"/>
            <circle class="printer-progress" cx="15" cy="15" r="12" fill="none" stroke="#22c55e" stroke-width="3.2" stroke-linecap="round" stroke-dasharray="75.4" stroke-dashoffset="75.4" transform="rotate(-90 15 15)"/>
          </svg>
          <span class="printer-percent">--</span>
        </div>
        <div class="printer-detail printer-detail-2">
          <span class="printer-name">--</span>
          <span class="printer-status">--</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Collapsed indicator (green bar) -->
  <div id="collapsed-indicator" title="点击展开"></div>

  <!-- Debug expand/collapse button -->
  <div id="debug-expand-btn" class="debug-expand-btn" style="display:none;">展开/收起</div>

  <!-- Standalone controls (hidden in Tauri mode) -->
  <button id="upload-btn" title="Upload background image">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
      <circle cx="8.5" cy="8.5" r="1.5"/>
      <polyline points="21 15 16 10 5 21"/>
    </svg>
  </button>
  <input type="file" id="file-input" accept="image/*" style="display:none;">

  <link rel="stylesheet" href="controls.css">
  <script src="app.js?v=13"></script>
  <script src="controls.js?v=13"></script>
  <script src="src/dom.js"></script>
  <script src="src/state.js"></script>
  <script src="src/modules/view-switcher.js"></script>
  <script src="src/modules/capsule-interaction.js"></script>
  <script src="src/modules/minimize.js"></script>
  <script src="src/modules/printer.js"></script>
  <script src="src/modules/shortcut.js"></script>
  <script src="src/modules/brightness.js"></script>
  <script src="src/main.js"></script>
  <script>
    (function() {
      var isTauri = window.__TAURI__ !== undefined;
      if (isTauri) {
        document.documentElement.classList.add('tauri-mode');
        document.body.classList.add('tauri-mode');
        initTauriMode();
      }
    })();

    async function initTauriMode() {
      var invoke = window.__TAURI__.core.invoke;
      var listen = window.__TAURI__.event.listen;

      // Listen for settings changes from the settings window
      await listen('settings-changed', function(event) {
        var cfg = event.payload;
        if (window.__liquidGlassConfig && cfg) {
          Object.keys(cfg).forEach(function(k) {
            if (typeof cfg[k] === 'object' && cfg[k] !== null && !Array.isArray(cfg[k]) && typeof window.__liquidGlassConfig[k] === 'object') {
              Object.assign(window.__liquidGlassConfig[k], cfg[k]);
            } else {
              window.__liquidGlassConfig[k] = cfg[k];
            }
          });
        }
      });

      // Update time
      function updateTime() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        var s = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('ov-time').textContent = h + ':' + m + ':' + s;
      }
      updateTime();
      setInterval(updateTime, 1000);

      // Update system info
      async function updateSysInfo() {
        try {
          var info = await invoke('get_system_stats');
          document.getElementById('ov-mem').textContent = '内存 ' + info.memory_percent + '%';
          document.getElementById('net-up').textContent = info.net_up_speed;
          document.getElementById('net-down').textContent = info.net_down_speed;
        } catch (e) {
          console.error('[SysInfo]', e);
        }
      }
      updateSysInfo();
      setInterval(updateSysInfo, 1500);

      // Screen capture for glass refraction source
      var screenTexture = null;
      var screenTexW = 0, screenTexH = 0;
      var capturing = false;
      var CAPTURE_INTERVAL = 7;

      function decodeJpegB64(b64) {
        return new Promise(function(resolve, reject) {
          var raw = atob(b64);
          var bytes = new Uint8Array(raw.length);
          for (var i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);
          var blob = new Blob([bytes], { type: 'image/jpeg' });
          var url = URL.createObjectURL(blob);
          var img = new Image();
          img.onload = function() { URL.revokeObjectURL(url); resolve(img); };
          img.onerror = function() { URL.revokeObjectURL(url); reject(new Error('JPEG decode failed')); };
          img.src = url;
        });
      }

      async function captureAndUpdateScreenTexture() {
        if (capturing) return;
        capturing = true;
        try {
          var glCanvas = document.getElementById('glCanvas');
          var gl = glCanvas.getContext('webgl2') || glCanvas.getContext('webgl');
          if (!gl) { capturing = false; return; }

          var getCurrentWindow = window.__TAURI__.window.getCurrentWindow;
          var pos = await getCurrentWindow().outerPosition();
          var capW = glCanvas.width;
          var capH = glCanvas.height;
          var capScreenX = Math.round(pos.x);
          var capScreenY = Math.round(pos.y);

          var b64 = await invoke('capture_screen', { x: capScreenX, y: capScreenY, width: capW, height: capH });
          if (!b64) { capturing = false; return; }

          var img = await decodeJpegB64(b64);

          requestAnimationFrame(function() {
            if (!screenTexture || screenTexW !== capW || screenTexH !== capH) {
              if (screenTexture) gl.deleteTexture(screenTexture);
              screenTexture = gl.createTexture();
              screenTexW = capW;
              screenTexH = capH;
              gl.bindTexture(gl.TEXTURE_2D, screenTexture);
              gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
              gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
              gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
              gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            }
            gl.bindTexture(gl.TEXTURE_2D, screenTexture);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
            if (window.__liquidGlassState) {
              window.__liquidGlassState.setScreenTexture(screenTexture, capW / capH);
            }
          });
        } catch (e) {
          console.error('[ScreenCap]', e);
        } finally {
          capturing = false;
          setTimeout(captureAndUpdateScreenTexture, CAPTURE_INTERVAL);
        }
      }
      captureAndUpdateScreenTexture();

      // Emit interacting state for click-through
      var canvas = document.getElementById('glCanvas');
      canvas.addEventListener('mouseenter', function() {
        window.__TAURI__.event.emit('set-interacting', true);
      });
      canvas.addEventListener('mouseleave', function() {
        window.__TAURI__.event.emit('set-interacting', false);
      });

      // Initialize island modules
      if (window.IslandMain) window.IslandMain.init();
    }
  </script>
</body>
</html>
